name: quigestor
description: App de gestão para o ecossistema Qui
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.6

  # Estado
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # Rede
  dio: ^5.4.0

  # Armazenamento
  shared_preferences: ^2.2.2

  # Injeção de dependência
  get_it: ^7.6.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true