name: quigestor
description: App de gestão para o ecossistema Qui
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.9
  modal_bottom_sheet: ^3.0.0
  flutter_colorpicker: ^1.1.0

  # Estado
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # Rede
  dio: ^5.4.0

  # Armazenamento
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/        # Para PNGs, JPGs
    - assets/svgs/
    - assets/fonts/

  fonts:
    - family: NotoColorEmoji
      fonts:
        - asset: assets/fonts/NotoColorEmoji-Regular.ttf
    - family: Roboto
#      fonts:
#        - asset: assets/fonts/Roboto-Regular.ttf
#        - asset: assets/fonts/Roboto-Bold.ttf
#          weight: 700
#        - asset: assets/fonts/Roboto-Italic.ttf
#          style: italic